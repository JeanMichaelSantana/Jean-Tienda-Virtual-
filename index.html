<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopMaster 🛒 - Tienda con IA</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>

  <!-- Font Awesome 6 Free -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <!-- jsPDF (última versión estable vía CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; color: #343a40; }
    .primary { background-color: #007BFF !important; border-color: #007BFF !important; }
    .success { background-color: #28A745 !important; border-color: #28A745 !important; }
    .card-img-top { height: 200px; object-fit: contain; background: white; padding: 10px; }
    .modal-img { max-height: 350px; object-fit: contain; }
    #cart-sidebar { position: fixed; top: 0; right: -400px; width: 400px; height: 100%; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.3); transition: right 0.4s; z-index: 1050; overflow-y: auto; }
    #cart-sidebar.show { right: 0; }
    .receipt { font-family: 'Courier New', Courier, monospace; font-size: 12px; width: 58mm; padding: 5mm; line-height: 1.3; }
  </style>
</head>
<body>

  <header class="bg-primary text-white py-3 text-center">
    <h1><i class="fas fa-shopping-cart"></i> ShopMaster</h1>
    <p>Tienda demo creada con ayuda de IA</p>
  </header>

  <div class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>Productos destacados 🛍️</h2>
      <button id="btnCart" class="btn btn-success"><i class="fas fa-shopping-cart"></i> Carrito (<span id="cartCount">0</span>)</button>
    </div>

    <div class="row" id="productsContainer"></div>
  </div>

  <!-- MODAL DETALLE PRODUCTO -->
  <div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="productModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="productModalLabel">Detalle del producto</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body text-center">
          <img id="modalImg" class="modal-img mb-3" src="" alt="Producto">
          <h4 id="modalTitle"></h4>
          <p id="modalDesc"></p>
          <p><strong>Categoría:</strong> <span id="modalCat"></span></p>
          <h3 class="text-success">$<span id="modalPrice"></span></h3>
          <div class="input-group w-50 mx-auto mt-3">
            <button class="btn btn-outline-secondary" id="btnLess">-</button>
            <input type="number" id="qty" class="form-control text-center" value="1" min="1"/>
            <button class="btn btn-outline-secondary" id="btnMore">+</button>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
          <button type="button" class="btn success" id="btnAddToCart"><i class="fas fa-cart-plus"></i> Agregar al carrito</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SIDEBAR CARRITO -->
  <div id="cart-sidebar" class="p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4>Tu carrito 🛒</h4>
      <button id="btnCloseCart" class="btn btn-outline-danger"><i class="fas fa-times"></i></button>
    </div>
    <div id="cartItems" class="mb-4"></div>
    <hr/>
    <h5>Total: $<span id="cartTotal">0.00</span></h5>
    <button id="btnCheckout" class="btn primary w-100 mt-3"><i class="fas fa-credit-card"></i> Ir a pagar</button>
  </div>

  <!-- MODAL PAGO (simulado) -->
  <div class="modal fade" id="paymentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Pago seguro 💳</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="paymentForm">
            <div class="mb-3">
              <label class="form-label">Nombre completo</label>
              <input type="text" class="form-control" id="fullName" required/>
            </div>
            <div class="mb-3">
              <label class="form-label">Número de tarjeta</label>
              <input type="text" class="form-control" id="cardNumber" placeholder="4242 4242 4242 4242" maxlength="19" required/>
            </div>
            <div class="row">
              <div class="col-6 mb-3">
                <label class="form-label">Vencimiento (MM/AA)</label>
                <input type="text" class="form-control" id="expiry" placeholder="12/28" maxlength="5" required/>
              </div>
              <div class="col-6 mb-3">
                <label class="form-label">CVC</label>
                <input type="text" class="form-control" id="cvc" maxlength="4" required/>
              </div>
            </div>
            <button type="submit" class="btn success w-100"><i class="fas fa-check"></i> Pagar ahora</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const { jsPDF } = window.jspdf;
    let currentProduct = null;
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    const productsContainer = document.getElementById('productsContainer');
    const cartCount = document.getElementById('cartCount');
    const cartItems = document.getElementById('cartItems');
    const cartTotal = document.getElementById('cartTotal');

    // Cargar productos desde Fake Store API
    fetch('https://fakestoreapi.com/products')
      .then(res => res.json())
      .then(products => {
        products.forEach(p => {
          const card = `
            <div class="col-md-4 col-lg-3 mb-4">
              <div class="card h-100 shadow-sm">
                <img src="${p.image}" class="card-img-top" alt="${p.title}">
                <div class="card-body d-flex flex-column">
                  <h5 class="card-title">${p.title.substring(0,50)}${p.title.length>50?'...':''}</h5>
                  <p class="card-text text-success fw-bold fs-5 mt-auto">$${p.price.toFixed(2)}</p>
                  <button class="btn primary view-detail" data-id="${p.id}">Ver más <i class="fas fa-eye"></i></button>
                </div>
              </div>
            </div>`;
          productsContainer.innerHTML += card;
        });
      })
      .catch(err => console.error(err));

    // Abrir modal con detalle
    document.addEventListener('click', e => {
      if (e.target.classList.contains('view-detail') || e.target.parentElement.classList.contains('view-detail')) {
        const btn = e.target.classList.contains('view-detail') ? e.target : e.target.parentElement;
        const id = btn.dataset.id;
        fetch(`https://fakestoreapi.com/products/${id}`)
          .then(res => res.json())
          .then(p => {
            currentProduct = p;
            document.getElementById('modalImg').src = p.image;
            document.getElementById('modalTitle').textContent = p.title;
            document.getElementById('modalDesc').textContent = p.description;
            document.getElementById('modalCat').textContent = p.category;
            document.getElementById('modalPrice').textContent = p.price.toFixed(2);
            document.getElementById('qty').value = 1;
            new bootstrap.Modal(document.getElementById('productModal')).show();
          });
      }
    });

    // Cantidad +/-
    document.getElementById('btnLess').onclick = () => {
      let v = parseInt(document.getElementById('qty').value);
      if (v > 1) document.getElementById('qty').value = v-1;
    };
    document.getElementById('btnMore').onclick = () => {
      let v = parseInt(document.getElementById('qty').value);
      document.getElementById('qty').value = v+1;
    };

    // Agregar al carrito
    document.getElementById('btnAddToCart').onclick = () => {
      const qty = parseInt(document.getElementById('qty').value);
      const already = cart.find(item => item.id === currentProduct.id);
      if (already) {
        already.quantity += qty;
      } else {
        cart.push({ ...currentProduct, quantity: qty });
      }
      saveCart();
      updateCartUI();
      bootstrap.Modal.getInstance(document.getElementById('productModal')).hide();
      alert('¡Producto agregado! 🛒');
    };

    function saveCart() {
      localStorage.setItem('cart', JSON.stringify(cart));
    }

    function updateCartUI() {
      cartCount.textContent = cart.reduce((sum, i) => sum + i.quantity, 0);
      let html = '';
      let total = 0;
      cart.forEach((item, index) => {
        const subtotal = item.price * item.quantity;
        total += subtotal;
        html += `
          <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
            <div>
              <strong>${item.title.substring(0,30)}...</strong><br/>
              $${item.price.toFixed(2)} x ${item.quantity} = $${subtotal.toFixed(2)}
            </div>
            <div>
              <button class="btn btn-sm btn-outline-primary me-1 adjust-qty" data-index="${index}" data-dir="minus">-</button>
              <button class="btn btn-sm btn-outline-primary me-1 adjust-qty" data-index="${index}" data-dir="plus">+</button>
              <button class="btn btn-sm btn-outline-danger remove-item" data-index="${index}"><i class="fas fa-trash"></i></button>
            </div>
          </div>`;
      });
      cartItems.innerHTML = html || '<p class="text-center text-muted">Carrito vacío</p>';
      cartTotal.textContent = total.toFixed(2);
    }

    // Abrir/cerrar carrito
    document.getElementById('btnCart').onclick = () => {
      document.getElementById('cart-sidebar').classList.add('show');
    };
    document.getElementById('btnCloseCart').onclick = () => {
      document.getElementById('cart-sidebar').classList.remove('show');
    };

    // Ajustar cantidad o eliminar desde carrito
    document.addEventListener('click', e => {
      if (e.target.classList.contains('adjust-qty')) {
        const index = e.target.dataset.index;
        const dir = e.target.dataset.dir;
        if (dir === 'minus' && cart[index].quantity > 1) {
          cart[index].quantity--;
        } else if (dir === 'plus') {
          cart[index].quantity++;
        }
        saveCart();
        updateCartUI();
      }
      if (e.target.classList.contains('remove-item') || e.target.parentElement.classList.contains('remove-item')) {
        const btn = e.target.classList.contains('remove-item') ? e.target : e.target.parentElement;
        const index = btn.dataset.index;
        cart.splice(index, 1);
        saveCart();
        updateCartUI();
      }
    });

    // Checkout → abrir modal pago
    document.getElementById('btnCheckout').onclick = () => {
      if (cart.length === 0) return alert('El carrito está vacío');
      new bootstrap.Modal(document.getElementById('paymentModal')).show();
    };

    // Simular pago y generar ticket
    document.getElementById('paymentForm').onsubmit = e => {
      e.preventDefault();
      const name = document.getElementById('fullName').value.trim();
      if (!name) return alert('Ingresa tu nombre');

      // Generar recibo térmico
      const doc = new jsPDF({
        unit: "mm",
        format: [58, 200]  // ancho 58mm típico ticket térmico, alto auto-ajustable
      });

      doc.setFont("courier", "normal");
      doc.setFontSize(10);

      let y = 5;
      doc.text("ShopMaster", 29, y, { align: "center" }); y += 6;
      doc.text("Gracias por tu compra!", 29, y, { align: "center" }); y += 8;
      doc.text(`Cliente: ${name}`, 5, y); y += 6;
      doc.text(`Fecha: ${new Date().toLocaleString()}`, 5, y); y += 8;
      doc.text("--------------------------------------", 5, y); y += 6;

      cart.forEach(item => {
        const line = `${item.quantity} ${item.title.substring(0,25)}... $${(item.price * item.quantity).toFixed(2)}`;
        doc.text(line, 5, y);
        y += 6;
      });

      doc.text("--------------------------------------", 5, y); y += 6;
      doc.setFontSize(12);
      doc.text(`TOTAL: $${cart.reduce((sum,i)=>sum+i.price*i.quantity,0).toFixed(2)}`, 5, y); y += 10;
      doc.setFontSize(10);
      doc.text("¡Vuelve pronto! ❤️", 29, y, { align: "center" });

      doc.save(`ticket-${Date.now()}.pdf`);

      // Limpiar carrito
      cart = [];
      saveCart();
      updateCartUI();
      bootstrap.Modal.getInstance(document.getElementById('paymentModal')).hide();
      document.getElementById('cart-sidebar').classList.remove('show');
      alert('¡Pago simulado exitoso! Descargando ticket... ✅');
    };

    // Inicializar carrito al cargar
    updateCartUI();
  </script>
</body>
</html>
